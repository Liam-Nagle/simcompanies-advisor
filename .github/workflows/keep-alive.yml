name: Keep SnapDeploy alive

on:
  schedule:
    # Ping every 5 minutes. GitHub Actions scheduler can drift by a few minutes
    # but that's fine — the goal is just to prevent the container sleeping.
    - cron: '*/5 * * * *'
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping proxy server
        # curl with a 60s timeout so it waits through the cold-start window.
        # --retry 3 retries on connection failure (e.g. mid-wake 503s).
        # --retry-delay 10 waits 10s between retries.
        # -f fails silently on HTTP errors so the step doesn't block the workflow.
        run: |
          curl --max-time 60 --retry 3 --retry-delay 10 -sf \
            https://osrs-bingo-bot.containers.snapdeploy.dev/healthz \
            && echo "Server is awake" \
            || echo "Ping failed (server may be cold-starting — next run will retry)"
